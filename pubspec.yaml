name: news
description: "News app - Technical test"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.1

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Dependency injection
  get_it: ^8.0.3

  # Functional programming
  fpdart: ^1.1.0

  # Navigation
  go_router: ^14.8.1

  # Network/Images
  cached_network_image: ^3.4.1

  # Local storage
  shared_preferences: ^2.5.2

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1

  # UI
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
